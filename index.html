<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"; // Use latest version
  import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";

  // Your web app's Firebase configuration
  const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "cal-airb-api.firebaseapp.com",
  projectId: "cal-airb-api",
  storageBucket: "cal-airb-api.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const functions = getFunctions(app, "us-central1"); // Specify region if not default

  const backfillButton = document.getElementById('backfillButton');
  backfillButton.onclick = async () => {
    console.log("Calling backfillAllRoomAvailabilitySummariesV2...");
    const backfillFunc = httpsCallable(functions, 'backfillAllRoomAvailabilitySummariesV2');
    try {
      const result = await backfillFunc({}); // Pass empty data if function doesn't expect specific input
      console.log("Backfill function result:", result.data);
      alert("Backfill initiated: " + result.data.message);
    } catch (error) {
      console.error("Error calling backfill function:", error);
      alert("Error initiating backfill: " + error.message);
    }
  };
</script>
<button id="backfillButton">Run Full Backfill (Rooms & Algolia Sync)</button>
