<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Room Reservation Calendar</title>
  
  <!-- FullCalendar Core CSS and JS (v5.10.1) -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.10.1/main.min.js"></script>
  
  <!-- FullCalendar Premium Plugins (v5.10.1) -->
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/resource-common@5.10.1/main.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/resource-timeline@5.10.1/main.global.min.js"></script>
  
  <!-- PapaParse for CSV parsing -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
  
  <style>
    /* Your existing styles unchanged */
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Hotel Room Reservation Calendar</h1>
    </header>
    
    <div class="upload-area">
      <h2>Upload Reservation Data</h2>
      <div id="plugin-status" class="info">Initializing calendar...</div>
      <input type="file" id="csv-upload" accept=".csv" multiple>
      <button id="load-btn">Load Reservations</button>
      <div id="status-message"></div>
    </div>
    
    <div id="calendar"></div>
    
    <div id="reservation-tooltip" class="reservation-tooltip"></div>
  </div>
  
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const pluginStatus = document.getElementById('plugin-status');
      
      // Check if plugins are available
      if (typeof FullCalendar === 'undefined' || !FullCalendar.ResourceTimelinePlugin) {
        pluginStatus.textContent = "Error: Resource Timeline plugin not loaded. Falling back to basic view.";
        pluginStatus.className = "error";
        initializeBasicCalendar();
        return;
      }
      
      pluginStatus.textContent = "FullCalendar plugins loaded successfully!";
      pluginStatus.className = "success";
      initializeCalendar();
    });
    
    let calendar;
    const calendarEl = document.getElementById('calendar');
    const statusMessage = document.getElementById('status-message');
    const tooltip = document.getElementById('reservation-tooltip');
    
    function initializeCalendar() {
      try {
        console.log('Initializing resource timeline calendar');
        
        calendar = new FullCalendar.Calendar(calendarEl, {
          schedulerLicenseKey: 'CC-Attribution-NonCommercial-NoDerivatives',
          initialView: 'resourceTimelineMonth',
          plugins: [
            'resource-common', // Not strictly needed with global scripts, but safe
            'resource-timeline'
          ],
          headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'resourceTimelineDay,resourceTimelineWeek,resourceTimelineMonth,dayGridMonth'
          },
          resources: [],
          events: [],
          resourceAreaWidth: '150px',
          resourceAreaHeaderContent: 'Rooms',
          slotDuration: { days: 1 },
          initialDate: '2025-03-01',
          resourceLabelDidMount: function(info) {
            const roomType = info.resource.extendedProps?.roomType || '';
            info.el.innerHTML = `
              <div class="room-label">Room ${info.resource.id}</div>
              <div class="room-type">${roomType}</div>
            `;
          },
          eventDidMount: function(info) {
            info.el.addEventListener('mouseover', function() {
              showTooltip(info.event, info.el);
            });
            info.el.addEventListener('mouseout', hideTooltip);
          }
        });
        
        calendar.render();
        showStatus('Calendar initialized. Ready to load data.', 'info');
        document.getElementById('load-btn').addEventListener('click', loadCSVFiles);
        
      } catch (error) {
        console.error('Error initializing calendar:', error);
        showStatus('Error initializing Resource Timeline. Falling back to basic view.', 'error');
        initializeBasicCalendar();
      }
    }
    
    function initializeBasicCalendar() {
      // Your existing basic calendar function unchanged
    }
    
    // Rest of your functions (loadCSVFiles, processCSVData, etc.) unchanged
  </script>
</body>
</html>
