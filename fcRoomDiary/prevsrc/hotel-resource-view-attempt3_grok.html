<script>
  document.addEventListener('DOMContentLoaded', function() {
    const pluginStatus = document.getElementById('plugin-status');
    const calendarEl = document.getElementById('calendar');
    const statusMessage = document.getElementById('status-message');
    const tooltip = document.getElementById('reservation-tooltip');

    // Basic check to ensure FullCalendar is loaded
    if (typeof FullCalendar === 'undefined') {
      pluginStatus.textContent = "Error: FullCalendar core not loaded.";
      pluginStatus.className = "error";
      return;
    }

    pluginStatus.textContent = "Attempting to initialize Resource Timeline...";
    pluginStatus.className = "info";

    // Initialize calendar
    let calendar;
    try {
      calendar = new FullCalendar.Calendar(calendarEl, {
        schedulerLicenseKey: 'CC-Attribution-NonCommercial-NoDerivatives',
        initialView: 'resourceTimelineMonth',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'resourceTimelineDay,resourceTimelineWeek,resourceTimelineMonth,dayGridMonth'
        },
        resources: [],
        events: [],
        resourceAreaWidth: '150px',
        resourceAreaHeaderContent: 'Rooms',
        slotDuration: { days: 1 },
        initialDate: '2025-03-01',
        resourceLabelDidMount: function(info) {
          const roomType = info.resource.extendedProps?.roomType || '';
          info.el.innerHTML = `
            <div class="room-label">Room ${info.resource.id}</div>
            <div class="room-type">${roomType}</div>
          `;
        },
        eventDidMount: function(info) {
          info.el.addEventListener('mouseover', function() {
            showTooltip(info.event, info.el);
          });
          info.el.addEventListener('mouseout', hideTooltip);
        }
      });

      calendar.render();
      pluginStatus.textContent = "Resource Timeline initialized successfully!";
      pluginStatus.className = "success";
      showStatus('Calendar initialized. Ready to load data.', 'info');
      document.getElementById('load-btn').addEventListener('click', loadCSVFiles);

    } catch (error) {
      console.error('Error initializing Resource Timeline:', error);
      pluginStatus.textContent = "Error: Resource Timeline plugin not loaded. Falling back to basic view.";
      pluginStatus.className = "error";
      initializeBasicCalendar();
    }

    // Rest of your functions (initializeBasicCalendar, loadCSVFiles, etc.) remain unchanged
  });

  // Show status message function
  function showStatus(message, type) {
    statusMessage.textContent = message;
    statusMessage.className = type || 'info';
  }

  // Tooltip functions (showTooltip, hideTooltip, etc.) remain unchanged
</script>
